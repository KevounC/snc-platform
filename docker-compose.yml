services:
  postgres:
    image: postgres:16
    container_name: snc-postgres
    environment:
      POSTGRES_USER: snc
      POSTGRES_PASSWORD: snc
      POSTGRES_DB: snc
    ports:
      - "5432:5432"
    volumes:
      - snc-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snc -d snc"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  snc-pgdata:
